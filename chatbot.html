«Все цены на сайте указаны без доставки. Стоимость доставки зависит от веса и объёма заказа — её может рассчитать только менеджер. Оставьте контакты, и менеджер свяжется с вами в течение дня, рассчитает доставку и подготовит КП.»

Краткое описание компании:
MegaCityShop — онлайн-магазин образовательной и учебной техники: от интерактивных стендов, комплексов для агротехнологий и лабораторного оборудования до мебели и детских учебных наборов.

Главные преимущества MegaCityShop:
1. **Принцип одного окна** — на нашем сайте представитель школы или ДОУ найдёт всё необходимое для оснащения: мебель, оборудование, спортивный инвентарь, интерактивные комплексы, расходники. Не нужно обращаться в разные компании — всё в одном месте.

Строго не более 3 сообщений до формы контактов.
1. Один вопрос: уточнить, что нужно (тип учреждения или категория товара).

const history = [];
let isOpen = false;

function toggleChat() {
  isOpen = !isOpen;
  document.getElementById('chatPopup').classList.toggle('open', isOpen);
}

function sendQuick(text) {
  document.getElementById('quickArea').style.display = 'none';
  document.getElementById('popupInput').value = text;
  sendMessage();
}

function appendMsg(role, text) {
  const area = document.getElementById('popupMessages');
  const row = document.createElement('div');
  row.className = `msg-row ${role}`;
  if (role === 'bot') {
    row.innerHTML = `<img class="msg-owl" src="semenovna.png" onerror="this.textContent='🦉';this.style.display='flex';this.style.alignItems='center';this.style.justifyContent='center'" alt=""><div class="msg-bubble">${text}</div>`;
  } else {
    row.innerHTML = `<div class="msg-bubble">${text}</div>`;
  }
  area.appendChild(row);
  area.scrollTop = area.scrollHeight;
}

function showTyping() {
  const area = document.getElementById('popupMessages');
  const row = document.createElement('div');
  row.className = 'msg-row bot'; row.id = 'typing';
  row.innerHTML = `<img class="msg-owl" src="semenovna.png" alt=""><div class="msg-bubble typing-bubble"><div class="t-dot"></div><div class="t-dot"></div><div class="t-dot"></div></div>`;
  area.appendChild(row);
  area.scrollTop = area.scrollHeight;
}

function showContactForm() {
  const form = document.getElementById('contactForm');
  form.classList.add('visible');
  form.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function submitForm() {
  const name = document.getElementById('formName').value.trim();
  const phone = document.getElementById('formPhone').value.trim();
  const email = document.getElementById('formEmail').value.trim();
  const consent = document.getElementById('formConsent').checked;

  if (!name || !phone) {
    alert('Пожалуйста, укажите имя и номер телефона');
    return;
  }
  if (!consent) {
    alert('Необходимо согласие на обработку персональных данных');
    return;
  }

  // Яндекс Метрика — цель solo_get_contact
  if (typeof ym !== 'undefined') ym(69334015, 'reachGoal', 'solo_get_contact');

  // Показываем успех
  document.getElementById('formSuccess').style.display = 'block';
  document.querySelector('.form-submit').style.display = 'none';

  // Добавляем в историю чата
  appendMsg('user', `Оставил заявку: ${name}, ${phone}${email ? ', ' + email : ''}`);
  history.push({ role: 'user', content: `Клиент оставил контакты: Имя: ${name}, Телефон: ${phone}, Email: ${email}` });

  // Финальный ответ бота
  setTimeout(() => {
    appendMsg('bot', `**${name}**, заявка принята! Менеджер свяжется с вами в течение дня и подготовит коммерческое предложение. Спасибо, что обратились в MegaCityShop! 🦉`);
  }, 500);
}

async function sendMessage() {
  const input = document.getElementById('popupInput');
  const text = input.value.trim();
  if (!text) return;
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) { alert('Введите API ключ'); return; }

  input.value = '';
  document.getElementById('sendBtn').disabled = true;
  appendMsg('user', text);
  history.push({ role: 'user', content: text });
  showTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 500,
        system: SYSTEM,
        messages: history
      })
    });
    const data = await res.json();
    document.getElementById('typing')?.remove();

    let reply = data.content?.[0]?.text || 'Произошла ошибка. Попробуйте ещё раз.';

    // Проверяем флаг $ST200 — показываем форму контактов
    const needsForm = reply.includes('$ST200');
    reply = reply.replace('$ST200', '').trim();

    // Форматируем жирный текст
    reply = reply.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    // Markdown-ссылки [текст](url) → кликабельные
    reply = reply.replace(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
    // Голые URL → кликабельные
    reply = reply.replace(/(?<!["\(])(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');

    history.push({ role: 'assistant', content: reply });
    appendMsg('bot', reply);

    if (needsForm) showContactForm();

  } catch {
    document.getElementById('typing')?.remove();
    appendMsg('bot', 'Не удалось подключиться. Проверьте API ключ.');
  }
  document.getElementById('sendBtn').disabled = false;
}
</script>
