<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Семёновна — MegaCityShop</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; background: #f0f0f0; min-height: 100vh; }

/* ── DEMO PAGE BG ── */
.demo-bg {
  background: linear-gradient(135deg, #1a4a8a 0%, #2d6cc0 50%, #7b4fc9 100%);
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
.demo-text {
  color: white; font-size: 48px; font-weight: 800;
  text-align: center; line-height: 1.2; opacity: 0.15;
  user-select: none; pointer-events: none;
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
}

/* ── WIDGET ── */
.chat-widget { position: fixed; bottom: 24px; right: 24px; z-index: 9999; }

/* Trigger button */
.chat-trigger {
  background: #2ABFC0;
  border: none; border-radius: 50px;
  padding: 14px 22px 14px 16px;
  display: flex; align-items: center; gap: 12px;
  cursor: pointer; box-shadow: 0 4px 20px rgba(42,191,192,0.45);
  transition: all 0.2s; font-family: 'Inter', sans-serif;
}
.chat-trigger:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(42,191,192,0.55); }
.trigger-avatar {
  width: 44px; height: 44px; border-radius: 50%;
  object-fit: cover; border: 2px solid rgba(255,255,255,0.4);
  background: #1A9EA0;
}
.trigger-text {
  color: white; font-size: 15px; font-weight: 600; white-space: nowrap;
}

/* Chat popup */
.chat-popup {
  position: absolute; bottom: 76px; right: 0;
  width: 360px;
  background: white; border-radius: 20px;
  box-shadow: 0 12px 48px rgba(0,0,0,0.18);
  overflow: hidden;
  transform: scale(0.9) translateY(20px);
  transform-origin: bottom right;
  opacity: 0; pointer-events: none;
  transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.chat-popup.open {
  transform: scale(1) translateY(0);
  opacity: 1; pointer-events: all;
}

/* Popup header */
.popup-header {
  background: #2ABFC0;
  padding: 16px 16px 16px 16px;
  display: flex; align-items: center; gap: 10px;
}
.popup-owl {
  width: 44px; height: 44px; border-radius: 50%;
  object-fit: cover; border: 2px solid rgba(255,255,255,0.4);
  background: #1A9EA0; flex-shrink: 0;
}
.popup-info { flex: 1; }
.popup-name { color: white; font-size: 14px; font-weight: 700; }
.popup-sub { color: rgba(255,255,255,0.8); font-size: 11px; margin-top: 1px; }
.popup-status { display: flex; align-items: center; gap: 5px; }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: #7effd4; }
.close-btn {
  width: 30px; height: 30px; border-radius: 50%;
  background: rgba(255,255,255,0.2); border: none;
  color: white; font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s; flex-shrink: 0;
}
.close-btn:hover { background: rgba(255,255,255,0.35); }

/* Messages area */
.popup-messages {
  padding: 16px; display: flex; flex-direction: column; gap: 12px;
  max-height: 300px; overflow-y: auto;
}
.popup-messages::-webkit-scrollbar { width: 3px; }
.popup-messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

/* Bot message row */
.msg-row { display: flex; gap: 8px; align-items: flex-end; }
.msg-row.user { flex-direction: row-reverse; }
.msg-owl {
  width: 32px; height: 32px; border-radius: 50%;
  object-fit: cover; flex-shrink: 0; background: #E0F7F7;
}
.msg-bubble {
  max-width: 78%; padding: 10px 14px;
  font-size: 14px; line-height: 1.5; border-radius: 18px;
}
.msg-row.bot .msg-bubble {
  background: #F4F4F4; color: #1a1a1a;
  border-bottom-left-radius: 4px;
}
.msg-row.user .msg-bubble {
  background: #2ABFC0; color: white;
  border-bottom-right-radius: 4px;
}

/* Typing */
.typing-bubble { display: flex; gap: 5px; align-items: center; padding: 12px 16px; }
.t-dot { width: 7px; height: 7px; border-radius: 50%; background: #aaa; animation: tdot 1.2s infinite; }
.t-dot:nth-child(2) { animation-delay: 0.2s; }
.t-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes tdot { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

/* Quick replies */
.quick-area {
  padding: 0 16px 14px;
  display: flex; flex-direction: column; align-items: flex-end; gap: 8px;
}
.q-btn {
  background: white; border: 1.5px solid #e0e0e0;
  border-radius: 50px; padding: 9px 18px;
  font-size: 13px; font-weight: 500; color: #1a1a1a;
  cursor: pointer; text-align: right;
  transition: all 0.15s; font-family: 'Inter', sans-serif;
  white-space: nowrap;
}
.q-btn:hover { border-color: #2ABFC0; color: #2ABFC0; background: #E0F7F7; }

/* API key (collapsed) */
.api-row {
  padding: 10px 16px;
  border-top: 1px solid #f0f0f0;
  display: flex; align-items: center; gap: 8px;
}
.api-row input {
  flex: 1; font-size: 11px; border: 1px solid #e0e0e0;
  border-radius: 8px; padding: 6px 10px;
  font-family: monospace; outline: none; color: #555;
  transition: border-color 0.15s;
}
.api-row input:focus { border-color: #2ABFC0; }
.api-row label { font-size: 11px; color: #aaa; white-space: nowrap; }

/* Input row */
.popup-input-row {
  padding: 10px 16px 14px;
  display: flex; gap: 8px; align-items: center;
  border-top: 1px solid #f0f0f0;
}
.popup-input {
  flex: 1; border: 1.5px solid #e8e8e8; border-radius: 24px;
  padding: 9px 16px; font-size: 13px; font-family: 'Inter', sans-serif;
  outline: none; resize: none; color: #1a1a1a;
  transition: border-color 0.2s; max-height: 80px; overflow-y: auto;
}
.popup-input:focus { border-color: #2ABFC0; }
.popup-input::placeholder { color: #bbb; }
.popup-send {
  width: 38px; height: 38px; border-radius: 50%;
  background: #2ABFC0; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: white; font-size: 16px; flex-shrink: 0;
  transition: background 0.15s;
}
.popup-send:hover { background: #1A9EA0; }
.popup-send:disabled { background: #ccc; cursor: not-allowed; }
</style>
</head>
<body>

<!-- Demo background to show the widget in context -->
<div class="demo-bg">
  <div class="demo-text">МЕБЕЛЬ ДЛЯ<br>ПРОЕКТОВ<br>ОБРАЗОВАНИЯ</div>
</div>

<!-- ── CHAT WIDGET ── -->
<div class="chat-widget">

  <!-- Popup -->
  <div class="chat-popup" id="chatPopup">

    <!-- Header -->
    <div class="popup-header">
      <img class="popup-owl" src="semenovna.png" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" alt="Семёновна">
      <div class="popup-owl" style="display:none;align-items:center;justify-content:center;font-size:22px;background:#1A9EA0;">🦉</div>
      <div class="popup-info">
        <div class="popup-name">Сова Семёновна</div>
        <div class="popup-sub popup-status">
          <span class="status-dot"></span> Онлайн · консультант
        </div>
      </div>
      <button class="close-btn" onclick="toggleChat()">✕</button>
    </div>

    <!-- Messages -->
    <div class="popup-messages" id="popupMessages">
      <div class="msg-row bot">
        <img class="msg-owl" src="semenovna.png" onerror="this.style.fontSize='18px';this.style.display='flex';this.style.alignItems='center';this.style.justifyContent='center';this.textContent='🦉'" alt="">
        <div class="msg-bubble">Сова Семёновна поможет в оснащении Школ и ДОУ! Какой у вас вопрос?</div>
      </div>
    </div>

    <!-- Quick replies -->
    <div class="quick-area" id="quickArea">
      <button class="q-btn" onclick="sendQuick('Для школы')">Для школы</button>
      <button class="q-btn" onclick="sendQuick('Для ДОУ')">Для ДОУ</button>
      <button class="q-btn" onclick="sendQuick('Нужно коммерческое предложение')">Нужно Коммерческое предложение</button>
      <button class="q-btn" onclick="sendQuick('Вопрос по доставке')">Вопрос по доставке</button>
      <button class="q-btn" onclick="sendQuick('Работаете по 44-ФЗ?')">По 44-ФЗ</button>
    </div>

    <!-- API key -->
    <div class="api-row">
      <label>API:</label>
      <input id="apiKey" type="password" placeholder="sk-ant-api03-...">
    </div>

    <!-- Input -->
    <div class="popup-input-row">
      <input class="popup-input" id="popupInput" type="text" placeholder="Напишите вопрос..."
        onkeydown="if(event.key==='Enter'){sendMessage();event.preventDefault()}">
      <button class="popup-send" id="sendBtn" onclick="sendMessage()">↑</button>
    </div>

  </div>

  <!-- Trigger button -->
  <button class="chat-trigger" onclick="toggleChat()">
    <img class="trigger-avatar" src="semenovna.png" onerror="this.style.display='none'" alt="">
    <span class="trigger-text">Задать вопрос</span>
  </button>

</div>

<script>
const SYSTEM = `Ты — Семёновна, дружелюбный консультант компании MegaCityShop.
Компания продаёт мебель для образования (школы, детские сады), офисов и медицинских учреждений. Работаем по всей России, полностью онлайн.
Клиенты: школы и детские сады (работаем по 44-ФЗ, тендеры и прямые договоры), госструктуры и нацпроекты, коммерческие компании — офисы и медцентры.
Преимущества: полный пакет документов (сертификаты, накладные, акты), широкий ассортимент, работа под ключ.
Отвечай кратко, по делу, тепло. Не придумывай конкретные цены — предлагай оставить заявку. Если не знаешь — предложи связаться с менеджером.`;

const history = [];
let isOpen = false;

function toggleChat() {
  isOpen = !isOpen;
  document.getElementById('chatPopup').classList.toggle('open', isOpen);
}

function sendQuick(text) {
  document.getElementById('quickArea').style.display = 'none';
  document.getElementById('popupInput').value = text;
  sendMessage();
}

function appendMsg(role, text) {
  const area = document.getElementById('popupMessages');
  const row = document.createElement('div');
  row.className = `msg-row ${role}`;
  if (role === 'bot') {
    row.innerHTML = `<img class="msg-owl" src="semenovna.png" onerror="this.textContent='🦉';this.style.display='flex';this.style.alignItems='center';this.style.justifyContent='center';this.style.fontSize='16px'" alt=""><div class="msg-bubble">${text.replace(/\n/g,'<br>')}</div>`;
  } else {
    row.innerHTML = `<div class="msg-bubble">${text}</div>`;
  }
  area.appendChild(row);
  area.scrollTop = area.scrollHeight;
}

function showTyping() {
  const area = document.getElementById('popupMessages');
  const row = document.createElement('div');
  row.className = 'msg-row bot'; row.id = 'typing';
  row.innerHTML = `<img class="msg-owl" src="semenovna.png" onerror="this.textContent='🦉'" alt=""><div class="msg-bubble typing-bubble"><div class="t-dot"></div><div class="t-dot"></div><div class="t-dot"></div></div>`;
  area.appendChild(row);
  area.scrollTop = area.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById('popupInput');
  const text = input.value.trim();
  if (!text) return;
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) { alert('Введите API ключ'); return; }

  input.value = '';
  document.getElementById('sendBtn').disabled = true;
  appendMsg('user', text);
  history.push({ role: 'user', content: text });
  showTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 400,
        system: SYSTEM,
        messages: history
      })
    });
    const data = await res.json();
    document.getElementById('typing')?.remove();
    const reply = data.content?.[0]?.text || 'Произошла ошибка. Попробуйте ещё раз.';
    history.push({ role: 'assistant', content: reply });
    appendMsg('bot', reply);
  } catch {
    document.getElementById('typing')?.remove();
    appendMsg('bot', 'Не удалось подключиться. Проверьте API ключ.');
  }
  document.getElementById('sendBtn').disabled = false;
}
</script>
</body>
</html>
